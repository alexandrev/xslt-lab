<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04101f" />
      <stop offset="55%" stop-color="#08213f" />
      <stop offset="100%" stop-color="#0e3872" />
    </linearGradient>
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07162f" />
      <stop offset="50%" stop-color="#0c3264" />
      <stop offset="100%" stop-color="#1480ff" />
    </linearGradient>
    <linearGradient id="logo-flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe07d" />
      <stop offset="100%" stop-color="#52f2c5" />
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1480ff" />
      <stop offset="100%" stop-color="#52f2c5" />
    </linearGradient>
    <linearGradient id="pill-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1480ff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#52f2c5" stop-opacity="0.18" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Decorative code brackets background (left) -->
  <g font-family="'Courier New', monospace" fill="rgba(142,223,255,0.05)" font-size="220" font-weight="bold">
    <text x="-30" y="420">&lt;</text>
    <text x="80" y="420">/</text>
    <text x="130" y="420">&gt;</text>
  </g>

  <!-- Decorative code brackets background (right) -->
  <g font-family="'Courier New', monospace" fill="rgba(82,242,197,0.04)" font-size="180" font-weight="bold">
    <text x="950" y="580">&lt;/&gt;</text>
  </g>

  <!-- Glow blob top-right -->
  <ellipse cx="1050" cy="120" rx="200" ry="120" fill="#1480ff" opacity="0.07" />
  <ellipse cx="1100" cy="520" rx="150" ry="100" fill="#52f2c5" opacity="0.05" />

  <!-- Logo icon (scaled from 48x48 to 120x120, positioned at 80,215) -->
  <g transform="translate(80, 215) scale(2.5)">
    <rect width="48" height="48" rx="10" fill="url(#logo-bg)" />
    <g stroke="#8edfff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.92">
      <path d="M15 10 L8.5 18 L15 26" />
      <path d="M15 22 L8.5 30 L15 38" />
      <path d="M33 10 L39.5 18 L33 26" />
      <path d="M33 22 L39.5 30 L33 38" />
    </g>
    <path d="M7 14h34" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
    <path d="M7 34h34" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
    <path d="M18 15 L27 15 L35 24 L27 33 L18 33 L23 27 L17 27 L13 24 L17 21 L23 21 Z" fill="url(#logo-flow)" />
    <path d="M18 15 L27 15 L35 24 L27 33 L18 33 L23 27 L17 27 L13 24 L17 21 L23 21 Z" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="0.8" stroke-linejoin="round" />
    <path d="M23 18 V30" stroke="#fff3d4" stroke-width="1.5" stroke-linecap="round" />
    <circle cx="23" cy="18" r="1.5" fill="#fffcf1" />
    <circle cx="23" cy="30" r="1.5" fill="#fffcf1" />
    <circle cx="23" cy="24" r="2.3" fill="#051c38" opacity="0.45" />
  </g>

  <!-- Main title -->
  <text x="82" y="196" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#52f2c5" letter-spacing="3" opacity="0.85">ONLINE XSLT EDITOR &amp; TESTER</text>

  <!-- XSLT Playground wordmark -->
  <text x="78" y="385" font-family="Arial, sans-serif" font-size="86" font-weight="700" fill="#ffffff" letter-spacing="-1">XSLT</text>
  <text x="78" y="475" font-family="Arial, sans-serif" font-size="86" font-weight="300" fill="#8edfff" letter-spacing="-1">Playground</text>

  <!-- Accent line -->
  <rect x="78" y="498" width="420" height="3" rx="2" fill="url(#accent-line)" />

  <!-- Tagline -->
  <text x="82" y="545" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">Transform XML with XSLT 2.0 &amp; 3.0 · Saxon engine</text>

  <!-- Right panel: code preview box -->
  <rect x="660" y="80" width="490" height="470" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

  <!-- Code panel top bar -->
  <rect x="660" y="80" width="490" height="42" rx="14" fill="rgba(255,255,255,0.07)" />
  <rect x="660" y="108" width="490" height="14" fill="rgba(255,255,255,0.07)" />

  <!-- Traffic lights -->
  <circle cx="694" cy="101" r="7" fill="#ff5f56" opacity="0.8" />
  <circle cx="718" cy="101" r="7" fill="#ffbd2e" opacity="0.8" />
  <circle cx="742" cy="101" r="7" fill="#27c93f" opacity="0.8" />

  <!-- Tab label -->
  <text x="770" y="106" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.4)">transform.xsl</text>

  <!-- Code lines -->
  <g font-family="'Courier New', monospace" font-size="15">
    <text x="688" y="158" fill="rgba(142,223,255,0.5)">&lt;?xml version="1.0"?&gt;</text>
    <text x="688" y="182" fill="rgba(142,223,255,0.7)">&lt;<tspan fill="#52f2c5">xsl:stylesheet</tspan> version=<tspan fill="#ffe07d">"3.0"</tspan>&gt;</text>
    <text x="688" y="206" fill="rgba(255,255,255,0.3)">  &lt;<tspan fill="#52f2c5">xsl:template</tspan> match=<tspan fill="#ffe07d">"/"</tspan>&gt;</text>
    <text x="688" y="230" fill="rgba(255,255,255,0.3)">    &lt;<tspan fill="#52f2c5">result</tspan>&gt;</text>
    <text x="688" y="254" fill="rgba(255,255,255,0.25)">      &lt;<tspan fill="#52f2c5">xsl:value-of</tspan></text>
    <text x="688" y="278" fill="rgba(255,255,255,0.25)">        select=<tspan fill="#ffe07d">"@name"</tspan>/&gt;</text>
    <text x="688" y="302" fill="rgba(255,255,255,0.3)">    &lt;/<tspan fill="#52f2c5">result</tspan>&gt;</text>
    <text x="688" y="326" fill="rgba(255,255,255,0.3)">  &lt;/<tspan fill="#52f2c5">xsl:template</tspan>&gt;</text>
    <text x="688" y="350" fill="rgba(142,223,255,0.5)">&lt;/<tspan fill="#52f2c5">xsl:stylesheet</tspan>&gt;</text>
  </g>

  <!-- Arrow + result -->
  <g transform="translate(688, 378)">
    <!-- success badge -->
    <rect x="0" y="0" width="130" height="32" rx="16" fill="url(#pill-bg)" stroke="rgba(39,201,63,0.4)" stroke-width="1" />
    <circle cx="20" cy="16" r="7" fill="#27c93f" opacity="0.85" />
    <text x="15" y="21" font-family="Arial, sans-serif" font-size="14" fill="#27c93f" font-weight="bold">✓</text>
    <text x="35" y="21" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" font-weight="600">  Success · 12ms</text>
  </g>

  <!-- Share pill -->
  <g transform="translate(688, 424)">
    <rect x="0" y="0" width="160" height="32" rx="16" fill="rgba(20,128,255,0.25)" stroke="rgba(20,128,255,0.5)" stroke-width="1" />
    <text x="18" y="21" font-family="Arial, sans-serif" font-size="18" fill="#8edfff">⬡</text>
    <text x="42" y="21" font-family="Arial, sans-serif" font-size="13" fill="#8edfff" font-weight="600">Share transform</text>
  </g>

  <!-- URL bar at bottom of code panel -->
  <rect x="675" y="468" width="460" height="28" rx="6" fill="rgba(0,0,0,0.25)" />
  <text x="690" y="487" font-family="'Courier New', monospace" font-size="12" fill="rgba(82,242,197,0.6)">xsltplayground.com/?xslt=PD94bW...</text>

  <!-- Bottom domain -->
  <text x="82" y="600" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.25)" letter-spacing="1">xsltplayground.com</text>
</svg>
