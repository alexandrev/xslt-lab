apiVersion: v1
kind: Service
metadata:
  name: {{ include "xslt-playground.fullname" . }}-frontend
  labels:
    {{- include "xslt-playground.labels" . | nindent 4 }}
    component: frontend
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: {{ .Values.service.frontend.port }}
      protocol: TCP
      name: http
{{- if .Values.metrics.enabled }}
    - port: {{ .Values.metrics.frontend.exporter.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
{{- end }}
  selector:
    {{- include "xslt-playground.selectorLabels" . | nindent 4 }}
    component: frontend

