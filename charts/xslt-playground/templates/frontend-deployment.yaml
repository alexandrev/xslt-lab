apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xslt-playground.fullname" . }}-frontend
  labels:
    {{- include "xslt-playground.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      {{- include "xslt-playground.selectorLabels" . | nindent 6 }}
      component: frontend
  template:
    metadata:
      labels:
        {{- include "xslt-playground.selectorLabels" . | nindent 8 }}
        component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          env:
            - name: VITE_BACKEND_URL
              value: {{ default (printf "http://%s-backend:%d" (include "xslt-playground.fullname" .) .Values.service.backend.port) .Values.frontend.backendUrl | quote }}
{{- if .Values.firebase.enabled }}
            - name: VITE_FIREBASE_CONFIG
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.firebase.secretName }}
                  key: {{ .Values.firebase.configKey }}
{{- end }}
{{- if .Values.frontend.googleAnalyticsId }}
            - name: VITE_GA_ID
              value: {{ .Values.frontend.googleAnalyticsId | quote }}
{{- end }}
{{- if .Values.frontend.clarityId }}
            - name: VITE_CLARITY_ID
              value: {{ .Values.frontend.clarityId | quote }}
{{- end }}
{{- if .Values.frontend.feedbackWebhookUrl }}
            - name: VITE_FEEDBACK_WEBHOOK_URL
              value: {{ .Values.frontend.feedbackWebhookUrl | quote }}
{{- end }}
{{- if .Values.adsTxt }}
          volumeMounts:
            - name: ads
              mountPath: /usr/share/nginx/html/ads.txt
              subPath: ads.txt
              readOnly: true
{{- end }}
          ports:
            - containerPort: {{ .Values.service.frontend.port }}
              name: http
          resources: {{- toYaml .Values.resources.frontend | nindent 12 }}
{{- if .Values.metrics.enabled }}
        - name: nginx-exporter
          image: {{ .Values.metrics.frontend.exporter.image | quote }}
          args:
            - --nginx.scrape-uri=http://127.0.0.1:{{ .Values.metrics.frontend.exporter.stubStatusPort }}/stub_status
          ports:
            - containerPort: {{ .Values.metrics.frontend.exporter.port }}
              name: metrics
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
{{- end }}
{{- if .Values.adsTxt }}
      volumes:
        - name: ads
          configMap:
            name: {{ include "xslt-playground.fullname" . }}-ads
            items:
              - key: ads.txt
                path: ads.txt
{{- end }}

