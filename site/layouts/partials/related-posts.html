{{- $related := first 4 (where (where .Site.RegularPages "Section" "posts") "Permalink" "ne" .Permalink) -}}
{{- if $related -}}
<aside class="related-posts">
  <h3>Related articles</h3>
  <ul>
    {{- range $related }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{- end }}
  </ul>
</aside>
{{- end -}}
